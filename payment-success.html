<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Payment Success | FreshCatch NG</title><link rel="icon" href="./assets/freshcatch-logo-trimmed.png" /><link rel="stylesheet" href="./styles.css" /></head><body><header><div class="container"><nav><a class="brand" href="./index.html"><img src="./assets/freshcatch-logo-trimmed.png" alt="FreshCatch NG logo"><span>FreshCatch NG</span></a><div class="nav-links"><a href="./index.html">Home</a><a href="./track.html">Track Order</a></div></nav></div></header><section class="hero" style="padding-top:40px"><div class="container"><div class="track-card fade-up"><div class="badge">Order Confirmation</div><h1 style="font-size:clamp(2rem,4vw,3.2rem)">Your order has been received</h1><p class="muted">We created your order. If you used Paystack, payment verification runs automatically.</p><div id="successBox" class="track-result" style="display:block">Checking order status...</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px"><a class="btn btn-primary" id="trackLink" href="./track.html">Track this order</a><a class="btn btn-outline" href="./index.html">Back to store</a></div></div></div></section><script>(async function(){const params=new URLSearchParams(window.location.search);const reference=params.get("reference");const mode=params.get("mode")||"paystack";const box=document.getElementById("successBox");const trackLink=document.getElementById("trackLink");if(!reference){box.textContent="Missing reference. Please contact support.";return;}trackLink.href=`./track.html?reference=${encodeURIComponent(reference)}`;if(mode==="paystack"){try{const res=await fetch(`/api/verify-paystack?reference=${encodeURIComponent(reference)}`);const data=await res.json();if(res.ok&&data.status){box.innerHTML=`<strong>Payment confirmed.</strong><br>Reference: ${reference}<br>Status: ${data.data.status}`;}else{box.innerHTML=`<strong>Order created.</strong><br>Reference: ${reference}<br>Payment verification is still pending.`;}}catch(e){box.innerHTML=`<strong>Order created.</strong><br>Reference: ${reference}<br>Verification will continue on the tracking page.`;}}else{box.innerHTML=`<strong>WhatsApp order created.</strong><br>Reference: ${reference}<br>Our team will confirm your order shortly.`;}})();</script></body></html>
